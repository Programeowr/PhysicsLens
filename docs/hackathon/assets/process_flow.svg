<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 700 28px Arial; fill: #0f172a; }
    .box { fill: #e2e8f0; stroke: #334155; stroke-width: 2; rx: 16; }
    .text { font: 600 20px Arial; fill: #0f172a; }
    .sub { font: 500 15px Arial; fill: #334155; }
    .arrow { stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb" />
    </marker>
  </defs>

  <text x="40" y="45" class="title">PhysicsLens Process Flow</text>

  <rect x="40" y="120" width="200" height="160" class="box"/>
  <text x="70" y="175" class="text">Input</text>
  <text x="65" y="205" class="sub">Text prompt or</text>
  <text x="80" y="228" class="sub">problem image</text>

  <rect x="290" y="120" width="220" height="160" class="box"/>
  <text x="320" y="175" class="text">Gemini Parsing</text>
  <text x="320" y="205" class="sub">Object + forces +</text>
  <text x="333" y="228" class="sub">scene extraction</text>

  <rect x="560" y="120" width="220" height="160" class="box"/>
  <text x="605" y="175" class="text">Validation</text>
  <text x="590" y="205" class="sub">Pydantic schema</text>
  <text x="590" y="228" class="sub">consistency checks</text>

  <rect x="830" y="120" width="200" height="160" class="box"/>
  <text x="865" y="175" class="text">Diagram</text>
  <text x="860" y="205" class="sub">SVG force-body</text>
  <text x="865" y="228" class="sub">generation</text>

  <rect x="1060" y="120" width="120" height="160" class="box"/>
  <text x="1075" y="175" class="text">UI</text>
  <text x="1070" y="205" class="sub">Preview +</text>
  <text x="1072" y="228" class="sub">export</text>

  <line x1="240" y1="200" x2="285" y2="200" class="arrow"/>
  <line x1="510" y1="200" x2="555" y2="200" class="arrow"/>
  <line x1="780" y1="200" x2="825" y2="200" class="arrow"/>
  <line x1="1030" y1="200" x2="1055" y2="200" class="arrow"/>
</svg>
