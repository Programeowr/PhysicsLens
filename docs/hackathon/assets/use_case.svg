    .small { font: 500 15px Arial; fill: #374151; }
    .line { stroke: #374151; stroke-width: 2.2; }
  </style>
  <text x="30" y="42" class="title">PhysicsLens Use-Case Diagram</text>

  <rect x="230" y="80" width="830" height="520" class="system" rx="18"/>
