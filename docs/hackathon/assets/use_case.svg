  <line x1="130" y1="290" x2="350" y2="380" class="line"/>
  <line x1="130" y1="560" x2="365" y2="490" class="line"/>

  <rect x="800" y="170" width="220" height="220" class="actor" rx="14"/>
  <text x="835" y="210" class="txt">Gemini API</text>
  <text x="830" y="240" class="small">Parses text &amp; image</text>
  <text x="830" y="265" class="small">into physics schema</text>

  <line x1="715" y1="180" x2="800" y2="220" class="line"/>
  <line x1="715" y1="280" x2="800" y2="280" class="line"/>
