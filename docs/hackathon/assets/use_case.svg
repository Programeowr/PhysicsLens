  <circle cx="95" cy="200" r="34" class="actor"/>
  <line x1="95" y1="234" x2="95" y2="330" class="line"/>
  <line x1="45" y1="265" x2="145" y2="265" class="line"/>
  <line x1="95" y1="330" x2="55" y2="390" class="line"/>
  <line x1="95" y1="330" x2="135" y2="390" class="line"/>
  <text x="25" y="430" class="txt">Student</text>

  <circle cx="95" cy="505" r="34" class="actor"/>
  <line x1="95" y1="539" x2="95" y2="610" class="line"/>
  <line x1="45" y1="568" x2="145" y2="568" class="line"/>
  <line x1="95" y1="610" x2="55" y2="640" class="line"/>
  <line x1="95" y1="610" x2="135" y2="640" class="line"/>
